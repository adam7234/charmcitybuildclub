<!doctype html>
<html lang="en">
  <head>
    <!-- Basic document metadata for every page on the site. -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />

    <!-- Social sharing metadata. -->
    <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">

    <!-- Bootstrap provides the layout grid and utility classes. -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- Site fonts: Inter for body text, Outfit for headings. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    >

    <!-- Shared stylesheet for the full site. -->
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />

    <!-- Optional per-page stylesheet hook if you ever need one later. -->
    {% if page.page_css %}
      <link rel="stylesheet" href="{{ page.page_css | relative_url }}" />
    {% endif %}
  </head>
  
  <script>
    (function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[])
    .push(arguments);},l=d.createElement(e),l.async=1,l.src=u,
    n=d.getElementsByTagName(e)[0],n.parentNode.insertBefore(l,n);})
    (window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
    ml('account', '2176476');
  </script>


  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
    <!-- Global navigation lives in an include so every page stays consistent. -->
    {% include navbar.html %}

    <!-- Main page content is injected here by Jekyll. -->
    <main>
      {{ content }}
    </main>

    <!-- Global footer include. -->
    {% include footer.html %}

    <!-- Bootstrap's JS powers the mobile navigation toggle. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
