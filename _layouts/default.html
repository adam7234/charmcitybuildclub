<!doctype html>
<html lang="en">
  <head>
    {% assign is_home = page.body_class == 'home-page' %}

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />

    <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">

    {% if is_home %}
      <style>
        html { font-size: 18px !important; }
      </style>
    {% endif %}

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- Global fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    >

    <!-- Home page fonts -->
    {% if is_home or page.home_fonts %}
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;700&family=Barlow+Condensed:wght@300;400;700&family=Bebas+Neue&display=swap"
        rel="stylesheet"
      >
    {% endif %}

    <!-- Global site CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />

    <!-- Page-specific CSS -->
    {% if is_home %}
      <link rel="stylesheet" href="{{ page.page_css | default: '/assets/css/raw-home.css' | relative_url }}" />
    {% elsif page.page_css %}
      <link rel="stylesheet" href="{{ page.page_css | relative_url }}" />
    {% endif %}
  </head>

  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
    {% include navbar.html %}

    <main class="{% if is_home %}p-0{% else %}pt-0 pb-4{% endif %}">
      {{ content }}
    </main>

    {% include footer.html %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
